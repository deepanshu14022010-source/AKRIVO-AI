<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="AKRIVO AI chat assistant with direct answers, voice controls, and live web sources.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="logo.png">
  <title>AKRIVO AI</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --surface: #0d1828;
      --surface-2: #122238;
      --surface-3: #182b45;
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #ecfeff;
      --muted: #9fb2c8;
      --muted-2: #7890a8;
      --brand: #22c55e;
      --brand-2: #14b8a6;
      --accent: #f59e0b;
      --danger: #fb7185;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      --radius: 8px;
      --sidebar-width: 292px;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.18), transparent 34rem),
        linear-gradient(135deg, #07111f 0%, #0b1727 52%, #101827 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    a {
      color: inherit;
    }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 18px;
      background: rgba(7, 17, 31, 0.88);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      margin-bottom: 18px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      background: #0b1727;
      border: 1px solid var(--line-strong);
    }

    .brand-title {
      display: grid;
      gap: 2px;
    }

    .brand-title strong {
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .brand-title span,
    .mini-label,
    .status-text,
    .source-count {
      color: var(--muted);
      font-size: 12px;
    }

    .sidebar-actions,
    .settings-stack {
      display: grid;
      gap: 10px;
    }

    .sidebar-actions {
      margin-bottom: 20px;
    }

    .button,
    .icon-button,
    .segment-button,
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .button:hover,
    .icon-button:hover,
    .segment-button:hover,
    .chip:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--line-strong);
    }

    .button:active,
    .icon-button:active,
    .segment-button:active,
    .chip:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: linear-gradient(135deg, var(--brand-2), var(--brand));
      color: #04120d;
      border-color: transparent;
      font-weight: 800;
    }

    .button.subtle {
      justify-content: flex-start;
      padding: 0 12px;
      color: var(--muted);
    }

    .button.subtle svg,
    .icon-button svg,
    .send-button svg,
    .chip svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .settings-panel {
      display: grid;
      gap: 14px;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--line);
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      min-height: 40px;
      padding: 0 38px 0 12px;
      color: var(--text);
      background: #0a1524;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: none;
      appearance: none;
    }

    .select-wrap svg {
      position: absolute;
      right: 12px;
      top: 50%;
      width: 17px;
      height: 17px;
      color: var(--muted);
      pointer-events: none;
      transform: translateY(-50%);
    }

    .segments {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      background: #0a1524;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .segment-button {
      min-height: 32px;
      padding: 0 8px;
      color: var(--muted);
      background: transparent;
      border-color: transparent;
      font-size: 13px;
      font-weight: 700;
    }

    .segment-button.active {
      color: #04120d;
      background: var(--brand);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 28px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #1b2c45;
      border: 1px solid var(--line);
      transition: background 160ms ease, border-color 160ms ease;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #dbeafe;
      transition: transform 160ms ease;
    }

    .switch input:checked + .switch-track {
      background: var(--brand-2);
      border-color: transparent;
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(20px);
    }

    .sidebar-footer {
      display: grid;
      gap: 10px;
      margin-top: auto;
      padding-top: 18px;
    }

    .health-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
    }

    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12);
    }

    .health-pill.ready .health-dot {
      background: var(--brand);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
    }

    .health-pill.error .health-dot {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 220px),
        rgba(5, 13, 25, 0.42);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 70px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 17, 31, 0.64);
      backdrop-filter: blur(16px);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .conversation-title {
      min-width: 0;
    }

    .conversation-title h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .conversation-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-button {
      width: 42px;
      min-width: 42px;
      height: 42px;
      padding: 0;
    }

    .mobile-only {
      display: none;
    }

    .chat-scroll {
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      scroll-behavior: smooth;
    }

    .chat-list {
      display: grid;
      gap: 18px;
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .message {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      animation: rise 180ms ease both;
    }

    .message.user {
      grid-template-columns: minmax(0, 1fr) 38px;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #14243a;
      border: 1px solid var(--line);
      color: var(--brand);
    }

    .avatar svg {
      width: 18px;
      height: 18px;
    }

    .message.user .avatar {
      grid-column: 2;
      color: #04120d;
      background: var(--brand);
      border-color: transparent;
    }

    .bubble {
      display: grid;
      gap: 10px;
      max-width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.15);
    }

    .message.user .bubble {
      grid-column: 1;
      grid-row: 1;
      justify-self: end;
      color: #04120d;
      background: linear-gradient(135deg, #5eead4, #86efac);
      border-color: transparent;
      max-width: min(680px, 100%);
    }

    .message.assistant .bubble {
      justify-self: start;
      max-width: min(760px, 100%);
    }

    .message-content {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.58;
      font-size: 15px;
    }

    .message-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      color: var(--muted-2);
      font-size: 12px;
    }

    .message.user .message-meta {
      color: rgba(4, 18, 13, 0.64);
    }

    .message-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 2px;
    }

    .message-action {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .message-action:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.09);
    }

    .message-action svg {
      width: 16px;
      height: 16px;
    }

    .sources {
      display: grid;
      gap: 8px;
      padding-top: 4px;
    }

    .source-link {
      display: grid;
      gap: 4px;
      padding: 10px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .source-link:hover {
      border-color: rgba(34, 197, 94, 0.45);
      background: rgba(34, 197, 94, 0.08);
    }

    .source-title {
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 750;
      font-size: 13px;
    }

    .source-title svg {
      width: 15px;
      height: 15px;
      color: var(--brand);
      flex: 0 0 auto;
    }

    .source-snippet {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .composer {
      padding: 16px 22px 20px;
      border-top: 1px solid var(--line);
      background: rgba(7, 17, 31, 0.7);
      backdrop-filter: blur(16px);
    }

    .composer-inner {
      display: grid;
      gap: 12px;
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .quick-prompts {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .chip {
      min-height: 34px;
      padding: 0 11px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .input-shell {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #081421;
      box-shadow: var(--shadow);
    }

    textarea {
      width: 100%;
      max-height: 160px;
      min-height: 46px;
      resize: none;
      padding: 12px 4px 9px 6px;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: 0;
      line-height: 1.45;
    }

    textarea::placeholder {
      color: #71859d;
    }

    .send-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 104px;
      height: 46px;
      padding: 0 16px;
      color: #04120d;
      background: linear-gradient(135deg, #5eead4, #86efac);
      border-radius: var(--radius);
      font-weight: 850;
      cursor: pointer;
    }

    .send-button:disabled {
      opacity: 0.56;
      cursor: not-allowed;
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      min-height: 24px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand);
      animation: pulse 900ms ease-in-out infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 120ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 240ms;
    }

    @keyframes pulse {
      0%,
      80%,
      100% {
        opacity: 0.28;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    .sidebar-backdrop {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 50;
      max-width: min(460px, calc(100vw - 32px));
      padding: 12px 14px;
      color: var(--text);
      background: #111f32;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 900px) {
      body {
        overflow: hidden;
      }

      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 40;
        width: min(86vw, 320px);
        transform: translateX(-104%);
        transition: transform 180ms ease;
        box-shadow: 24px 0 60px rgba(0, 0, 0, 0.36);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        z-index: 35;
        display: block;
        background: rgba(0, 0, 0, 0.48);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .sidebar-backdrop.show {
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-only {
        display: inline-flex;
      }

      .topbar {
        min-height: 64px;
        padding: 12px 14px;
      }

      .topbar-right .health-pill {
        display: none;
      }

      .chat-scroll {
        padding: 18px 12px;
      }

      .message,
      .message.user {
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 9px;
      }

      .message.user .avatar {
        grid-column: 1;
      }

      .message.user .bubble {
        grid-column: 2;
        justify-self: stretch;
      }

      .avatar {
        width: 32px;
        height: 32px;
      }

      .bubble {
        padding: 12px;
      }

      .composer {
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      }

      .input-shell {
        grid-template-columns: 1fr auto;
      }

      #voiceButton {
        display: none;
      }

      .send-button {
        min-width: 48px;
        width: 48px;
        padding: 0;
      }

      .send-label {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .conversation-title h1 {
        font-size: 16px;
      }

      .conversation-title p {
        max-width: 210px;
      }

      .quick-prompts {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="AKRIVO controls">
      <div class="brand">
        <img src="logo.png" alt="AKRIVO AI logo">
        <div class="brand-title">
          <strong>AKRIVO AI</strong>
          <span>Live assistant</span>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="button primary" id="newChatButton" type="button">
          <i data-lucide="plus"></i>
          New chat
        </button>
        <button class="button subtle" id="installButton" type="button" hidden>
          <i data-lucide="download"></i>
          Install app
        </button>
      </div>

      <section class="settings-panel" aria-label="Chat settings">
        <div class="field">
          <span class="mini-label">Model</span>
          <label class="select-wrap">
            <select id="modelSelect" aria-label="AI model">
              <option value="llama-3.3-70b-versatile">Balanced - Llama 3.3 70B</option>
              <option value="llama-3.1-8b-instant">Fast - Llama 3.1 8B</option>
            </select>
            <i data-lucide="chevron-down"></i>
          </label>
        </div>

        <div class="field">
          <span class="mini-label">Live search</span>
          <div class="segments" role="group" aria-label="Live search mode">
            <button class="segment-button active" type="button" data-search-mode="auto">Auto</button>
            <button class="segment-button" type="button" data-search-mode="on">Web</button>
            <button class="segment-button" type="button" data-search-mode="off">Off</button>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="mini-label">Auto speak</div>
            <div class="status-text">Off by default</div>
          </div>
          <label class="switch">
            <input id="speakToggle" type="checkbox">
            <span class="switch-track"></span>
          </label>
        </div>
      </section>

      <div class="sidebar-footer">
        <div class="health-pill" id="healthPill">
          <span class="health-dot"></span>
          <span id="healthText">Checking backend</span>
        </div>
        <span class="status-text" id="searchStatus">Search: auto</span>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button mobile-only" id="menuButton" type="button" title="Open menu" aria-label="Open menu">
            <i data-lucide="menu"></i>
          </button>
          <div class="conversation-title">
            <h1>AKRIVO AI</h1>
            <p id="subtitle">Ask, search, write, code, and learn in one place.</p>
          </div>
        </div>
        <div class="topbar-right">
          <div class="health-pill" id="topHealthPill">
            <span class="health-dot"></span>
            <span id="topHealthText">Checking</span>
          </div>
          <button class="icon-button" id="clearButton" type="button" title="Clear chat" aria-label="Clear chat">
            <i data-lucide="trash-2"></i>
          </button>
          <button class="icon-button" id="stopSpeechButton" type="button" title="Stop speaking" aria-label="Stop speaking">
            <i data-lucide="volume-x"></i>
          </button>
        </div>
      </header>

      <section class="chat-scroll" id="chatScroll" aria-live="polite">
        <div class="chat-list" id="chatList"></div>
      </section>

      <footer class="composer">
        <div class="composer-inner">
          <div class="quick-prompts" aria-label="Quick prompts">
            <button class="chip" type="button" data-prompt="Search the web and summarize today's AI news.">
              <i data-lucide="newspaper"></i>
              AI news
            </button>
            <button class="chip" type="button" data-prompt="What happened today in India? Give sources.">
              <i data-lucide="radio"></i>
              Today
            </button>
            <button class="chip" type="button" data-prompt="Help me build a mobile app version of this project.">
              <i data-lucide="smartphone"></i>
              Mobile app
            </button>
            <button class="chip" type="button" data-prompt="Debug this error step by step: ">
              <i data-lucide="bug"></i>
              Debug
            </button>
            <button class="chip" type="button" data-prompt="Write a clean plan for my project idea: ">
              <i data-lucide="list-checks"></i>
              Plan
            </button>
          </div>

          <form class="input-shell" id="chatForm">
            <textarea id="messageInput" rows="1" placeholder="Ask AKRIVO anything..." autocomplete="off"></textarea>
            <button class="icon-button" id="voiceButton" type="button" title="Voice input" aria-label="Voice input">
              <i data-lucide="mic"></i>
            </button>
            <button class="send-button" id="sendButton" type="submit">
              <span class="send-label">Send</span>
              <i data-lucide="send-horizontal"></i>
            </button>
          </form>
        </div>
      </footer>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    const apiBase = window.location.protocol === "file:" ? "http://localhost:3000" : window.location.origin;
    const sessionId = getSessionId();
    const chatList = document.getElementById("chatList");
    const chatScroll = document.getElementById("chatScroll");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const voiceButton = document.getElementById("voiceButton");
    const modelSelect = document.getElementById("modelSelect");
    const speakToggle = document.getElementById("speakToggle");
    const searchStatus = document.getElementById("searchStatus");
    const sidebar = document.getElementById("sidebar");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    const menuButton = document.getElementById("menuButton");
    const newChatButton = document.getElementById("newChatButton");
    const clearButton = document.getElementById("clearButton");
    const stopSpeechButton = document.getElementById("stopSpeechButton");
    const installButton = document.getElementById("installButton");
    const toast = document.getElementById("toast");
    let deferredInstallPrompt = null;
    let busy = false;
    let searchMode = localStorage.getItem("akrivoSearchMode") || "auto";

    const welcomeText = "Hi, I am AKRIVO AI. I can answer normally, and when your question needs fresh information I can use live web results and show sources.";

    init();

    function init() {
      if (window.lucide) window.lucide.createIcons();
      setSearchMode(searchMode);
      restoreSettings();
      addMessage("assistant", welcomeText, { meta: "Ready" });
      checkHealth();
      bindEvents();
      registerServiceWorker();
      resizeTextarea();
    }

    function bindEvents() {
      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage();
      });

      messageInput.addEventListener("input", resizeTextarea);
      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      document.querySelectorAll("[data-search-mode]").forEach((button) => {
        button.addEventListener("click", () => setSearchMode(button.dataset.searchMode));
      });

      document.querySelectorAll("[data-prompt]").forEach((button) => {
        button.addEventListener("click", () => {
          messageInput.value = button.dataset.prompt;
          resizeTextarea();
          messageInput.focus();
        });
      });

      speakToggle.addEventListener("change", () => {
        localStorage.setItem("akrivoSpeakReplies", speakToggle.checked ? "true" : "false");
      });

      modelSelect.addEventListener("change", () => {
        localStorage.setItem("akrivoModel", modelSelect.value);
      });

      menuButton.addEventListener("click", openSidebar);
      sidebarBackdrop.addEventListener("click", closeSidebar);
      newChatButton.addEventListener("click", startNewChat);
      clearButton.addEventListener("click", clearChat);
      stopSpeechButton.addEventListener("click", stopSpeaking);
      voiceButton.addEventListener("click", startVoice);
      installButton.addEventListener("click", installApp);

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installButton.hidden = false;
      });
    }

    function restoreSettings() {
      const savedModel = localStorage.getItem("akrivoModel");
      if (savedModel && [...modelSelect.options].some((option) => option.value === savedModel)) {
        modelSelect.value = savedModel;
      }
      speakToggle.checked = localStorage.getItem("akrivoSpeakReplies") === "true";
    }

    function getSessionId() {
      const existing = localStorage.getItem("akrivoSessionId");
      if (existing) return existing;
      const next = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      localStorage.setItem("akrivoSessionId", next);
      return next;
    }

    function setSearchMode(mode) {
      searchMode = mode;
      localStorage.setItem("akrivoSearchMode", mode);
      document.querySelectorAll("[data-search-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.searchMode === mode);
      });
      searchStatus.textContent = `Search: ${mode === "on" ? "always web" : mode}`;
    }

    function resizeTextarea() {
      messageInput.style.height = "auto";
      messageInput.style.height = `${Math.min(messageInput.scrollHeight, 160)}px`;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || busy) return;
      const speakReply = shouldSpeakReply(message);

      busy = true;
      sendButton.disabled = true;
      addMessage("user", message, { meta: "You" });
      messageInput.value = "";
      resizeTextarea();

      const loading = addLoadingMessage();

      try {
        const response = await fetch(`${apiBase}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            model: modelSelect.value,
            searchMode,
            sessionId
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.reply || "Backend request failed.");
        }

        updateAssistantMessage(loading, data.reply || "I did not receive a reply.", {
          sources: data.sources || [],
          meta: buildMeta(data)
        });

        if (data.searchNote) showToast(data.searchNote);
        if (speakReply) speak(data.reply || "");
      } catch (error) {
        updateAssistantMessage(loading, `I could not connect to AKRIVO backend.\n\n${error.message}`, {
          meta: "Connection issue"
        });
      } finally {
        busy = false;
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    function buildMeta(data) {
      if (data.usedSearch) return `Live search - ${data.searchProvider || "web"}`;
      if (data.searchNote) return data.searchNote;
      return "AI response";
    }

    function shouldSpeakReply(message) {
      if (speakToggle.checked) return true;
      return /\b(speak|read)\b.*\b(aloud|out loud|to me|the answer|this answer|reply)\b/i.test(message)
        || /\b(voice reply|answer aloud|say it out loud)\b/i.test(message);
    }

    function addMessage(role, text, options = {}) {
      const message = document.createElement("article");
      message.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerHTML = role === "user" ? '<i data-lucide="user"></i>' : '<i data-lucide="sparkles"></i>';

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const content = document.createElement("div");
      content.className = "message-content";
      content.textContent = text;
      bubble.appendChild(content);

      const meta = document.createElement("div");
      meta.className = "message-meta";
      meta.textContent = options.meta || new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      bubble.appendChild(meta);

      if (role === "assistant" && !options.loading) {
        appendMessageActions(bubble);
      }

      message.appendChild(avatar);
      message.appendChild(bubble);
      chatList.appendChild(message);
      if (window.lucide) window.lucide.createIcons();
      scrollToBottom();
      return message;
    }

    function addLoadingMessage() {
      const message = addMessage("assistant", "", { meta: "Thinking", loading: true });
      const content = message.querySelector(".message-content");
      content.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      return message;
    }

    function appendMessageActions(bubble) {
      const existing = bubble.querySelector(".message-actions");
      if (existing) existing.remove();

      const actions = document.createElement("div");
      actions.className = "message-actions";
      actions.appendChild(createMessageAction("copy", "Copy answer", () => copyMessage(bubble)));
      actions.appendChild(createMessageAction("volume-2", "Speak answer", () => {
        const text = bubble.querySelector(".message-content")?.textContent || "";
        speak(text);
      }));
      actions.appendChild(createMessageAction("volume-x", "Stop speaking", stopSpeaking));
      bubble.appendChild(actions);
    }

    function createMessageAction(icon, label, onClick) {
      const button = document.createElement("button");
      button.className = "message-action";
      button.type = "button";
      button.title = label;
      button.setAttribute("aria-label", label);
      button.innerHTML = `<i data-lucide="${icon}"></i>`;
      button.addEventListener("click", onClick);
      return button;
    }

    async function copyMessage(bubble) {
      const text = bubble.querySelector(".message-content")?.textContent.trim();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        showToast("Answer copied.");
      } catch {
        showToast("Copy is not available in this browser.");
      }
    }

    function updateAssistantMessage(message, text, options = {}) {
      const content = message.querySelector(".message-content");
      const meta = message.querySelector(".message-meta");
      content.textContent = text;
      meta.textContent = options.meta || "AI response";

      const existingSources = message.querySelector(".sources");
      if (existingSources) existingSources.remove();

      if (options.sources && options.sources.length) {
        const sources = document.createElement("div");
        sources.className = "sources";

        const count = document.createElement("span");
        count.className = "source-count";
        count.textContent = `${options.sources.length} source${options.sources.length > 1 ? "s" : ""}`;
        sources.appendChild(count);

        options.sources.forEach((source, index) => {
          const link = document.createElement("a");
          link.className = "source-link";
          link.href = source.link;
          link.target = "_blank";
          link.rel = "noopener noreferrer";

          const title = document.createElement("div");
          title.className = "source-title";
          title.innerHTML = '<i data-lucide="external-link"></i>';
          title.appendChild(document.createTextNode(`[${index + 1}] ${source.title || source.link}`));

          const snippet = document.createElement("div");
          snippet.className = "source-snippet";
          snippet.textContent = source.snippet || source.link;

          link.appendChild(title);
          link.appendChild(snippet);
          sources.appendChild(link);
        });

        message.querySelector(".bubble").appendChild(sources);
      }

      appendMessageActions(message.querySelector(".bubble"));
      if (window.lucide) window.lucide.createIcons();
      scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatScroll.scrollTop = chatScroll.scrollHeight;
      });
    }

    async function checkHealth() {
      const pills = [document.getElementById("healthPill"), document.getElementById("topHealthPill")];
      const labels = [document.getElementById("healthText"), document.getElementById("topHealthText")];

      try {
        const response = await fetch(`${apiBase}/health`);
        const health = await response.json();
        const ready = health.ok && health.groqConfigured;
        pills.forEach((pill) => pill.classList.toggle("ready", ready));
        pills.forEach((pill) => pill.classList.toggle("error", !ready));
        const searchLabel = health.googleSearchConfigured ? "Google + free sources ready" : "Free sources ready";
        labels[0].textContent = ready ? `Online - ${searchLabel}` : "Groq key missing";
        labels[1].textContent = ready ? "Online" : "Setup needed";
      } catch {
        pills.forEach((pill) => pill.classList.add("error"));
        labels[0].textContent = "Backend offline";
        labels[1].textContent = "Offline";
      }
    }

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showToast("Voice input is not supported in this browser.");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.onresult = (event) => {
        messageInput.value = event.results[0][0].transcript;
        resizeTextarea();
        sendMessage();
      };
      recognition.onerror = () => showToast("Voice input stopped. Please try again.");
      recognition.start();
    }

    function speak(text) {
      if (!text || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 1;
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeaking() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
    }

    function openSidebar() {
      sidebar.classList.add("open");
      sidebarBackdrop.classList.add("show");
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      sidebarBackdrop.classList.remove("show");
    }

    function clearChat() {
      chatList.innerHTML = "";
      addMessage("assistant", welcomeText, { meta: "Ready" });
    }

    function startNewChat() {
      localStorage.removeItem("akrivoSessionId");
      window.location.reload();
    }

    async function installApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installButton.hidden = true;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 3200);
    }

    function registerServiceWorker() {
      if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      }
    }
  </script>
</body>
</html>
